spring.application.name=SRINMiniProject
server.port=${SERVER_PORT:9999}

# ---- Datasource (PostgreSQL) ----
# Values are overridable via environment variables so the same build runs
# locally (defaults below) and inside Docker Compose (env from compose file).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/library}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:library}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:library}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# ---- DevTools (live reload) ----
spring.devtools.restart.enabled=true
# Poll the classpath so restarts trigger reliably inside a Docker bind mount.
spring.devtools.restart.poll-interval=1000
spring.devtools.restart.quiet-period=400

# ---- CORS (frontend origins allowed to call the API) ----
