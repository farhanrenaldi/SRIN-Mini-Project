services:
  db:
    image: postgres:17-alpine
    container_name: library-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-library}
      POSTGRES_USER: ${POSTGRES_USER:-library}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-library}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-library} -d ${POSTGRES_DB:-library}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: library-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 9999
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-library}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-library}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-library}
      SPRING_JPA_DDL_AUTO: update
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:4173
    ports:
      - "${BACKEND_PORT:-9999}:9999"
    volumes:
      - ./backend:/app
      - backend_target:/app/target
      - maven_repo:/root/.m2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: library-frontend
    depends_on:
      - backend
    environment:
      # Vite proxies /api to the backend service (avoids CORS in the browser).
      VITE_PROXY_TARGET: http://backend:9999
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
  backend_target:
  maven_repo:
